<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About Me</a>
        <a href="activities.html">Activities</a>
        <a href="gallery.html">Gallery</a>
        <a href="contact.html">Contact</a>
    </nav>

    <h1>Image Gallery</h1>
    
    <div class="gallery">
        <div class="gallery-item">
            <img src="images/photo1.jpg" alt="Photo 1" class="gallery-img">
            <div class="caption">Caption for Photo 1</div>
        </div>
        <div class="gallery-item">
            <img src="images/photo2.jpg" alt="Photo 2" class="gallery-img">
            <div class="caption">Caption for Photo 2</div>
        </div>
        <div class="gallery-item">
            <img src="images/photo3.jpg" alt="Photo 3" class="gallery-img">
            <div class="caption">Caption for Photo 3</div>
        </div>
        <!-- Add more gallery items as needed -->

    <!-- Lightbox Modal -->
    <div id="lightbox" class="lightbox">
        <span class="close">&times;</span>
        <div class="lightbox-content">
            <img id="lightbox-img" src="" alt="">
            <div id="lightbox-caption"></div>
            <button class="nav-button prev" onclick="changeImage(-1)">&#10094;</button>
            <button class="nav-button next" onclick="changeImage(1)">&#10095;</button>
        </div>
    </div>

    <script>
        let currentImageIndex = 0;
        const galleryImages = document.querySelectorAll('.gallery-img');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const lightboxCaption = document.getElementById('lightbox-caption');
        const closeBtn = document.querySelector('.close');

        // Open lightbox on image click
        galleryImages.forEach((img, index) => {
            img.addEventListener('click', function() {
                currentImageIndex = index;
                openLightbox(img);
            });
        });

        function openLightbox(img) {
            const caption = img.nextElementSibling.textContent;
            lightboxImg.src = img.src;
            lightboxCaption.textContent = caption;
            lightbox.style.display = 'flex';
        }

        function closeLightbox() {
            lightbox.style.display = 'none';
        }

        function changeImage(n) {
            currentImageIndex += n;
            if (currentImageIndex >= galleryImages.length) {
                currentImageIndex = 0;
            } else if (currentImageIndex < 0) {
                currentImageIndex = galleryImages.length - 1;
            }
            openLightbox(galleryImages[currentImageIndex]);
        }

        closeBtn.addEventListener('click', closeLightbox);

        // Close lightbox when clicking outside the image
        lightbox.addEventListener('click', function(e) {
            if (e.target === lightbox) {
                closeLightbox();
            }
        });

        // Keyboard navigation
        document.addEventListener('keydown', function(e) {
            if (lightbox.style.display === 'flex') {
                if (e.key === 'ArrowLeft') changeImage(-1);
                if (e.key === 'ArrowRight') changeImage(1);
                if (e.key === 'Escape') closeLightbox();
            }
        });
    </script>
</body>
</html>
