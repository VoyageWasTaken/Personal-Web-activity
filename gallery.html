<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <a href="index.html"><i class="fas fa-code"></i> CDV</a>
            </div>
            <ul class="nav-menu">
                <li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
                <li class="nav-item"><a href="about.html" class="nav-link">About Me</a></li>
                <li class="nav-item"><a href="activities.html" class="nav-link">Activities</a></li>
                <li class="nav-item"><a href="gallery.html" class="nav-link active">Gallery</a></li>
                <li class="nav-item"><a href="contact.html" class="nav-link">Contact</a></li>
            </ul>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>            
            </div>
        </div>
    </nav>

    <main>
        <section class="hero">
            <h1>Image Gallery</h1>
            <p class="subtitle">My Collection of Creative Designs</p>
        </section>

        <section class="content">
            <div class="gallery-container"> 
                <div class="gallery">
                    <div class="gallery-item">
                        <img src="images/kawaii.png" alt="Kawaii Image" class="gallery-img">
                        <div class="gallery-caption">Kawaii Style</div>
                    </div>
                    <div class="gallery-item">
                        <img src="images/alpha-yowai.jpg" alt="JPG Image" class="gallery-img">
                        <div class="gallery-caption">Alpha Yowai</div>
                    </div>
                    <div class="gallery-item">
                        <img src="images/alpha-goat.gif" alt="GIF Animation" class="gallery-img">
                        <div class="gallery-caption">Alpha Goat</div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Lightbox Modal -->
    <div id="lightbox" class="lightbox">
        <span class="close">&times;</span>
        <div class="lightbox-content">
            <img id="lightbox-img" src="images/kawaii.png" alt="Kawaii Image">
            <div id="lightbox-caption"></div>
            <button class="nav-button prev" onclick="changeImage(-1)">&#10094;</button>
            <button class="nav-button next" onclick="changeImage(1)">&#10095;</button>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Christian Villena. All rights reserved.</p>
    </footer>

    <script src="javascript/gallery-javascript.js" defer></script>
</body>
</html>
