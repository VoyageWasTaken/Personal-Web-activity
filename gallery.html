<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About Me</a>
        <a href="activities.html">Activities</a>
        <a href="gallery.html">Gallery</a>
        <a href="contact.html">Contact</a>
    </nav>

    <h1>Image Gallery</h1>
    
    <div class="gallery-container"> 
        <div class="gallery">
            <div class="gallery-item">
                <img src="images/kawaii.png" alt="Kawaii Image" class="gallery-img">
                <div class="gallery-caption">Kawaii Style</div>
            </div>
            <div class="gallery-item">
                <img src="images/alpha-yowai.jpg" alt="JPG Image" class="gallery-img">
                <div class="gallery-caption">Alpha Yowai</div>
            </div>
            <div class="gallery-item">
                <img src="images/alpha-goat.gif" alt="GIF Animation" class="gallery-img">
                <div class="gallery-caption">Alpha Goat</div>
            </div>
        </div>
    </div>

    <!-- Lightbox Modal -->
    <div id="lightbox" class="lightbox">
        <span class="close">&times;</span>
        <div class="lightbox-content">
            <img id="lightbox-img" src="images/kawaii.png" alt="Kawaii Image">
            <div id="lightbox-caption"></div>
            <button class="nav-button prev" onclick="changeImage(-1)">&#10094;</button>
            <button class="nav-button next" onclick="changeImage(1)">&#10095;</button>
        </div>
    </div>

     <script src="javascript/gallery-javascript.js" defer></script>
        
    </script>
</body>
</html>
